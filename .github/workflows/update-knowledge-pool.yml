name: Update Knowledge Pool

on:
  push:
    branches:
      - master

jobs:
  update-knowledge-pool:
    runs-on: ubuntu-latest
    # Skip when the commit was made by the bot itself to prevent infinite loops.
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 2 ensures both the latest commit and its parent are
          # available so that `git show HEAD` can produce a meaningful diff.
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate knowledge pool entry
        run: python scripts/generate_knowledge_entry.py

      - name: Commit and push updated knowledge pool files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/Knowledge_Pool.md docs/Knowledge_Pool_Notes.txt
          if git diff --cached --quiet; then
            echo "No changes to knowledge pool files — skipping commit."
          else
            git commit -m "docs: update knowledge pool files for commit ${{ github.sha }}"
            git push
          fi
